<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E8A0BF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Miau">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>Miau — Imunoterapie</title>
</head>
<body>
  <div id="app">
    <!-- Conținutul este generat dinamic de app.js -->
    <div class="loading">
      <div class="paw-icon">🐾</div>
      <p>Se încarcă...</p>
    </div>
  </div>

  <!-- EmailJS (opțional, pentru rapoarte mail) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script src="app.js"></script>

  <script>
    // Înregistrare Service Worker (PWA offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
