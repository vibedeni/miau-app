<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4A9B8E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Miau">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Miau — Imunoterapie</title>
  <meta name="description" content="Aplicație gratuită pentru gestionarea imunoterapiei sublinguale la copii. Timere, stocuri, simptome — totul offline, fără cont, fără reclame.">
  <meta property="og:title" content="Miau — Imunoterapie alergii copii">
  <meta property="og:description" content="Aplicație gratuită, fără reclame, fără server. Timere, stocuri, simptome — totul pe telefonul tău.">
  <meta property="og:image" content="https://app.miauapp.ro/og-image.png">
  <meta property="og:url" content="https://app.miauapp.ro">
  <meta name="twitter:card" content="summary">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://api.emailjs.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;">
</head>
<body>
  <div id="app">
    <!-- Conținutul este generat dinamic de app.js -->
    <div class="loading">
      <div class="paw-icon">🐾</div>
      <p>Se încarcă...</p>
    </div>
  </div>

  <!-- EmailJS (opțional, pentru rapoarte mail) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script src="app.js"></script>

  <script>
    // Înregistrare Service Worker (PWA offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          // Forțează verificarea unui nou SW la fiecare încărcare (important pe iOS)
          reg.update();
        }).catch(err => console.log('SW error:', err));

        // Când un nou SW preia controlul, reîncarcă pagina ca să servească fișierele noi din cache
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
